name: Apply SUSFS Patch 5.4

on:
  workflow_dispatch:

jobs:
  susfs-patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Install patch tool
        run: |
          sudo apt update
          sudo apt install -y patch

      - name: Download SUSFS Patch
        run: |
          wget https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_5.4.patch

      - name: Apply Patch
        run: |
          patch -p1 < susfs_patch_to_5.4.patch

      - name: Commit Changes
        run: |
          git add .
          git commit -m "Apply SUSFS patch for kernel 5.4"
          git push
